<div id="class-erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#0d2d52' : '#E6F1FB',
    primaryBorderColor: dark ? '#02a0b3' : '#185FA5',
    primaryTextColor: dark ? '#e8f4fa' : '#042C53',
    secondaryColor: dark ? '#1a1040' : '#EEEDFE',
    tertiaryColor: dark ? '#04342c' : '#E1F5EE',
  },
});
const { svg } = await mermaid.render('class-svg', `classDiagram
  class WardData {
    +String Month
    +String WardLabel
    +String Municipali
    +Float latitude
    +Float longitude
    +Float LST_Surface_C
    +Float Air_Temp_C
    +Float Soil_Moisture
    +Float NDWI_Water
    +Float Agric_Percentage
    +Float Population_Density_Per_KM2
    +Float Habitat_Class_Code
  }
  class RiskScore {
    +Int score
    +String label
    +String color
    +calculateRisk(wardData) Int
    +getLabel(score) String
    +getColor(score) String
  }
  class Municipality {
    +String name
    +WardData[] wards
    +getWardsByMonth(month) WardData[]
    +getWardByLabel(label) WardData
  }
  class DashboardState {
    +Int currentMonthIndex
    +String riskFilter
    +WardData selectedWard
    +Municipality selectedMunicipality
    +reset() void
    +applySelection() void
    +updateTimeSlider(index) void
  }
  class MapLayer {
    +CircleMarker[] markers
    +LayerGroup cityLayer
    +renderHotspots(wards) void
    +clearLayers() void
    +flyToWard(ward, zoom) void
    +openPopup(ward) void
  }
  class AlertEngine {
    +Map thresholds
    +checkRisk(score) String
    +getPopupContent(ward, risk) String
  }
  DashboardState --> Municipality : selects
  DashboardState --> WardData : selectedWard
  Municipality "1" --> "*" WardData : contains
  RiskScore ..> WardData : uses
  MapLayer ..> RiskScore : renders
  MapLayer ..> WardData : displays
  AlertEngine ..> RiskScore : evaluates
  DashboardState --> MapLayer : controls
`);
document.getElementById('class-erd').innerHTML = svg;

document.querySelectorAll('#class-erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#class-erd svg .row-rect-odd path, #class-erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
